name: Flutter fine shyyyy

on:
  push:
    branches: [ "main", "dev", "ci_cd_development", "connect_with_supabase" ]
  pull_request:
    branches: [ "main", "dev", "ci_cd_development", "connect_with_supabase" ]

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - name: Create .env file
        working-directory: ./geo_master
        run: |
          echo "PROJECT_URL=${{ secrets.SUPABASE_PROJECT_URL }}" >> .env
          echo "PUBLISHABLE_KEY=${{ secrets.SUPABASE_PUBLISHABLE_KEY }}" >> .env

      - name: Install dependencies
        working-directory: ./geo_master
        run: flutter pub get

      - name: Enable web
        working-directory: ./geo_master
        run: flutter create . --platforms web

      - name: Build web
        working-directory: ./geo_master
        run: flutter build web --release --base-href "/GeoMaster/" \
          --dart-define=PROJECT_URL=${{ secrets.SUPABASE_PROJECT_URL }} \
          --dart-define=PUBLISHABLE_KEY=${{ secrets.SUPABASE_PUBLISHABLE_KEY }}

      - name: Upload web build
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: geo_master/build/web/

  deploy-web:
    runs-on: ubuntu-latest
    needs: build-web
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download web build
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: web-build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: web-build
